<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siqueira - Copa de Indicações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 4px solid #fbbf24; color: white !important; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-28">

    <header class="bg-blue-800 text-white p-6 pt-10 shadow-2xl sticky top-0 z-50 rounded-b-[2.5rem]">
        <div class="max-w-md mx-auto flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black italic text-amber-400">COPA <span class="text-white not-italic">SIQUEIRA</span></h1>
                <p class="text-[9px] opacity-70 font-bold uppercase tracking-[0.2em]">Ranking de Indicações 2026</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-bold uppercase opacity-60">Prêmio Final</p>
                <p class="text-sm font-black text-amber-400">R$ 500,00 🏆</p>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide px-1" id="abasVendedores">
            </div>
    </header>

    <div class="max-w-md mx-auto px-5 mt-6 space-y-6">
        
        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Classificação Geral</h3>
            <div id="podium" class="space-y-2"></div>
        </section>

        <section id="painelVendedor" class="bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-blue-600 hidden animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <span id="iconeAtivo" class="text-4xl mb-2 block"></span>
                    <h2 id="nomeAtivo" class="text-3xl font-black text-slate-900 uppercase tracking-tighter italic">---</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Pontos</p>
                    <p id="scoreAtivo" class="text-4xl font-black text-blue-700">0</p>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-2xl mb-6 flex justify-between items-center border border-blue-100">
                <p class="text-xs font-bold text-blue-800">Prêmio Acumulado:</p>
                <p id="premioAtivo" class="font-black text-blue-700">R$ 0,00</p>
            </div>

            <button onclick="registrar()" class="w-full bg-blue-700 text-white font-black py-5 rounded-3xl shadow-lg shadow-blue-100 active:scale-95 transition-all text-sm uppercase tracking-widest">
                🚀 REGISTRAR INDICAÇÃO
            </button>
        </section>

        <section id="sessaoHistorico" class="hidden pb-10">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 mb-4 italic">Linha do Tempo</h3>
            <div id="lista" class="space-y-3"></div>
        </section>
    </div>

    <script>
        // CONFIGURAÇÃO DO TIME
        const TIME = [
            { nome: "Lis", icone: "🌸" },
            { nome: "Duda", icone: "✨" },
            { nome: "Roberta", icone: "💎" },
            { nome: "Matheus", icone: "⚡" },
            { nome: "Denis", icone: "🎯" }
        ];

        const VALOR_INDICACAO = 25.00; // Quanto vale cada indicação no parcial

        let dados = JSON.parse(localStorage.getItem('siqueira_game_v1')) || {};
        let ativo = null;

        // Iniciar dados vazios se necessário
        TIME.forEach(v => { if (!dados[v.nome]) dados[v.nome] = { pts: 0, logs: [] }; });

        function atualizar() {
            // Renderizar Abas
            const abas = document.getElementById('abasVendedores');
            abas.innerHTML = '';
            TIME.forEach(v => {
                const isSelected = ativo === v.nome;
                abas.innerHTML += `
                    <button onclick="selecionar('${v.nome}')" class="flex-shrink-0 px-5 py-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${isSelected ? 'tab-active' : 'opacity-60'}">
                        <span class="text-xl">${v.icone}</span>
                        <span class="text-[10px] font-black uppercase">${v.nome}</span>
                    </button>`;
            });

            // Ranking Geral
            const podium = document.getElementById('podium');
            const ranking = TIME.map(v => ({...v, pts: dados[v.nome].pts})).sort((a,b) => b.pts - a.pts);
            podium.innerHTML = '';
            ranking.forEach((v, i) => {
                podium.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-3">
                            <span class="font-black w-5 text-center ${i===0?'text-amber-500':'text-slate-400'}">${i+1}º</span>
                            <span class="text-lg">${v.icone}</span>
                            <span class="font-bold text-sm">${v.nome}</span>
                        </div>
                        <span class="font-black text-blue-700">${v.pts} <span class="text-[9px] text-slate-400">IDCs</span></span>
                    </div>`;
            });

            // Painel Individual
            if (ativo) {
                const user = TIME.find(v => v.nome === ativo);
                document.getElementById('painelVendedor').classList.remove('hidden');
                document.getElementById('sessaoHistorico').classList.remove('hidden');
                document.getElementById('nomeAtivo').innerText = ativo;
                document.getElementById('iconeAtivo').innerText = user.icone;
                document.getElementById('scoreAtivo').innerText = dados[ativo].pts;
                document.getElementById('premioAtivo').innerText = "R$ " + (dados[ativo].pts * VALOR_INDICACAO).toLocaleString('pt-BR', {minimumFractionDigits:2});

                const lista = document.getElementById('lista');
                lista.innerHTML = '';
                dados[ativo].logs.forEach((log, i) => {
                    lista.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                            <div>
                                <p class="font-bold text-slate-800 text-sm italic">Indicação #${dados[ativo].pts - i}</p>
                                <p class="text-[9px] text-slate-400 font-bold">${log.data}</p>
                            </div>
                            <button onclick="remover(${i})" class="text-[10px] font-black text-rose-300">ESTORNAR</button>
                        </div>`;
                });
            }
            localStorage.setItem('siqueira_game_v1', JSON.stringify(dados));
        }

        function selecionar(nome) { ativo = nome; atualizar(); }

        function registrar() {
            if(!ativo) return;
            dados[ativo].pts += 1;
            dados[ativo].logs.unshift({ data: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            atualizar();
        }

        function remover(i) {
            if(confirm("Remover esta indicação?")) {
                dados[ativo].pts -= 1;
                dados[ativo].logs.splice(i, 1);
                atualizar();
            }
        }

        atualizar();
    </script>
</body>
</html>
